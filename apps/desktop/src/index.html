<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanPDF Desktop</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <aside>
      <div class="brand">
        <img src="../assets/icon.png" alt="ScanPDF">
        <div><strong>ScanPDF</strong><span>Desktop</span></div>
      </div>
      <nav id="navigation" class="hidden">
        <button class="nav active" data-view="convert">Chuyển đổi</button>
        <button class="nav" data-view="history">Lịch sử</button>
        <button class="nav" data-view="settings">Cài đặt</button>
      </nav>
      <div id="user-card" class="user-card hidden"></div>
    </aside>

    <main>
      <section id="login-view" class="centered">
        <form id="login-form" class="panel login-panel">
          <h1>Đăng nhập ScanPDF</h1>
          <p>Đồng bộ lịch sử và hạn mức với tài khoản web.</p>
          <label>API URL<input id="login-api-url" type="url" required></label>
          <label>Email<input id="email" type="email" required></label>
          <label>Mật khẩu<input id="password" type="password" minlength="8" required></label>
          <label id="otp-label" class="hidden">Mã 2FA<input id="otp" inputmode="numeric" maxlength="6"></label>
          <button class="primary" type="submit">Đăng nhập</button>
        </form>
      </section>

      <section id="convert-view" class="view hidden">
        <div class="page-title"><div><span>CÔNG CỤ PDF</span><h1>Chuyển đổi tài liệu</h1></div></div>
        <div class="panel converter">
          <label>Công cụ<select id="tool"></select></label>
          <button id="select-files" class="dropzone">
            <strong>Chọn file từ máy tính</strong>
            <span id="selected-files">Chưa chọn file</span>
          </button>
          <div id="tool-options"></div>
          <button id="convert-button" class="primary" disabled>Bắt đầu xử lý</button>
          <div id="conversion-status" class="status hidden"></div>
        </div>
      </section>

      <section id="history-view" class="view hidden">
        <div class="page-title"><div><span>TÀI KHOẢN</span><h1>Lịch sử chuyển đổi</h1></div><button id="refresh-history" class="secondary">Làm mới</button></div>
        <div id="history-list" class="history-grid"></div>
      </section>

      <section id="settings-view" class="view hidden">
        <div class="page-title"><div><span>HỆ THỐNG</span><h1>Cài đặt</h1></div></div>
        <div class="panel settings">
          <label>API URL<input id="api-url" type="url"></label>
          <button id="save-api-url" class="primary">Lưu API URL</button>
          <button id="open-web" class="secondary">Mở ScanPDF trên web</button>
          <button id="logout-button" class="danger">Đăng xuất</button>
        </div>
      </section>
      <div id="toast" class="toast hidden"></div>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
