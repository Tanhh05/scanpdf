name: Backend Render Deploy

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render production deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::error::Missing repository secret RENDER_API_KEY"
            exit 1
          fi

          if [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::Missing repository variable RENDER_SERVICE_ID"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --data '{"clearCache":"do_not_clear"}'
