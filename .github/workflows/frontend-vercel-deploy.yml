name: Frontend Vercel Deploy
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-vercel-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify frontend types
        run: npm run lint -w frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.scanpdf.vn/api

      - name: Deploy latest frontend to Vercel production
        working-directory: frontend
        run: npx vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
