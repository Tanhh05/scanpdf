name: Frontend CI
on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-deploy.yml"]
  pull_request:
    paths: ["frontend/**"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint -w frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.scanpdf.vn/api
      - run: npm run build -w frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.scanpdf.vn/api
