name: VPS Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: vps-deploy-main
      cancel-in-progress: true
    steps:
      - name: Deploy latest main to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            git config --global --add safe.directory /var/www/scanpdf

            cd /var/www/scanpdf

            git fetch origin main
            git reset --hard origin/main

            docker compose up -d --build --remove-orphans
            docker compose ps

            for i in $(seq 1 60); do
              if curl --fail --silent --show-error http://127.0.0.1:4000/health; then
                break
              fi
              if [ "$i" -eq 60 ]; then
                docker compose logs --tail=120 api
                exit 1
              fi
              sleep 2
            done

            for i in $(seq 1 60); do
              if curl --fail --silent --show-error --head http://127.0.0.1:3000; then
                break
              fi
              if [ "$i" -eq 60 ]; then
                docker compose logs --tail=120 web
                exit 1
              fi
              sleep 2
            done

            docker image prune -f
