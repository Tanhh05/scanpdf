name: VPS Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: vps-deploy-main
      cancel-in-progress: true
    steps:
      - name: Deploy latest main to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            git config --global --add safe.directory /var/www/scanpdf

            cd /var/www/scanpdf

            git fetch origin main
            git reset --hard origin/main

            docker compose up -d --build --remove-orphans
            docker compose ps

            curl --fail --silent --show-error http://127.0.0.1:4000/health
            curl --fail --silent --show-error --head http://127.0.0.1:3000

            docker image prune -f
