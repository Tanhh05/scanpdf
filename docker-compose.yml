services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: scanpdf
      POSTGRES_PASSWORD: scanpdf
      POSTGRES_DB: scanpdf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanpdf"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scanpdf:scanpdf@postgres:5432/scanpdf
      REDIS_URL: redis://redis:6379
      STORAGE_ROOT: /app/storage
    command: sh -c "npx prisma migrate deploy && node dist/src/server.js"
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scanpdf:scanpdf@postgres:5432/scanpdf
      REDIS_URL: redis://redis:6379
      STORAGE_ROOT: /app/storage
    command: node dist/src/workers/conversion.worker.js
    volumes:
      - ./storage:/app/storage
    depends_on:
      api:
        condition: service_started

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
